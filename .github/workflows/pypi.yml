name: Publish to PyPI

# Triggers: Run manually or automatically when a new GitHub Release is published
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # REQUIRED: These permissions allow the magical OIDC authentication to PyPI
    permissions:
      id-token: write  
      contents: read   

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build source and wheel distributions
        # This replaces the build portion of `make pypi`
        run: python -m build

      - name: Publish package distributions to PyPI
        # This official action handles the upload using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
